<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #059669;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p style="color: #6b7280; font-size: 14px;">Establish a secure new password for your account.</p>
        <input type="password" id="newPass" placeholder="New Password" required />
        <input type="password" id="confirmPass" placeholder="Confirm Password" required />
        <button id="btn" onclick="resetPassword()">Secure Reset</button>
        <p id="msg" class="error"></p>
    </div>

    <script>
        const email = sessionStorage.getItem('resetEmail');
        if (!email) {
            window.location.href = 'forgot-password.html';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newPass').value;
            const confirmPassword = document.getElementById('confirmPass').value;
            const msgEl = document.getElementById('msg');
            const btn = document.getElementById('btn');

            if (!newPassword || !confirmPassword) return;

            if (newPassword !== confirmPassword) {
                msgEl.textContent = 'Passwords do not perfectly match.';
                msgEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Executing Sequence...';
            msgEl.style.display = 'none';

            try {
                const res = await fetch('http://localhost:3000/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword, confirmPassword })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                sessionStorage.removeItem('resetEmail');

                alert(data.message);
                window.location.href = 'http://localhost:3000/login.html';
            } catch (err) {
                msgEl.textContent = err.message;
                msgEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Secure Reset';
            }
        }
    </script>
</body>

</html>

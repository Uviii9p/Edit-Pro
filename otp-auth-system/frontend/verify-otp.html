<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
            font-size: 24px;
            letter-spacing: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Authentication</h2>
        <p style="color: #6b7280; font-size: 14px;">Enter the 6-digit secure code sent to <br><b id="displayEmail"></b>
        </p>
        <input type="text" id="otp" placeholder="••••••" maxlength="6" required />
        <button id="btn" onclick="verifyOtp()">Verify Code</button>
        <p id="msg" class="error"></p>
    </div>

    <script>
        const email = sessionStorage.getItem('resetEmail');
        if (!email) {
            alert('Session expired. Go back.');
            window.location.href = 'forgot-password.html';
        }
        document.getElementById('displayEmail').textContent = email;

        async function verifyOtp() {
            const otp = document.getElementById('otp').value;
            const msgEl = document.getElementById('msg');
            const btn = document.getElementById('btn');

            if (otp.length !== 6) return alert('Enter the full 6-digit OTP code.');

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            msgEl.style.display = 'none';

            try {
                const res = await fetch('http://localhost:3000/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                alert(data.message);
                window.location.href = 'reset-password.html';
            } catch (err) {
                msgEl.textContent = err.message;
                msgEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        }
    </script>
</body>

</html>

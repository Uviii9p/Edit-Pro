<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — EditPro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-card">
        <a href="/login" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
            </svg>
            Back to Login
        </a>

        <div class="brand">
            <h1>Account Recovery</h1>
            <p>Enter your registered email address and we'll send a 6-digit OTP code to your inbox.</p>
        </div>

        <div class="steps">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <div id="msg" class="msg"></div>

        <form onsubmit="handleSendOtp(event)">
            <div class="field">
                <label>Email Address</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                    <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn-primary">Send OTP Code</button>
        </form>

        <p class="footer-text">Remember your password? <a href="/login">Sign In</a></p>
    </div>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — EditPro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-card">
        <div class="brand">
            <h1>New Password</h1>
            <p>Create a strong new password for your EditPro Studio account.</p>
        </div>

        <div class="steps">
            <div class="step-dot done"></div>
            <div class="step-dot done"></div>
            <div class="step-dot active"></div>
        </div>

        <div id="msg" class="msg"></div>

        <form onsubmit="handleResetPassword(event)">
            <div class="field">
                <label>New Password</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="newPassword" placeholder="Min 6 characters" minlength="6" required>
                </div>
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" minlength="6" required>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn-primary btn-success">Reset Password</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        if (!sessionStorage.getItem('reset_email')) {
            window.location.href = 'forgot-password.html';
        }
    </script>
</body>

</html>
